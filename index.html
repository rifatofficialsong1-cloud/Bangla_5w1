<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - Unlock to Watch</title>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0e1621; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 20px; border-radius: 15px; background: #17212b; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        h2 { font-size: 20px; margin-bottom: 20px; }
        #playBtn { background-color: #2481cc; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; transition: 0.3s; width: 100%; font-weight: bold; }
        #playBtn:hover { background-color: #2895e7; }
        .footer { margin-top: 20px; font-size: 12px; color: #6c7883; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ভিডিওটি আনলক করতে নিচের বাটনে ক্লিক করুন</h2>
        <button id="playBtn">Play Video & Unlock</button>
        <p class="footer">অ্যাড দেখা শেষ হলে ভিডিও অটোমেটিক প্লে হবে</p>
    </div>

    <script>
        // ১. URL থেকে ভিডিও লিংক সংগ্রহ করা
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('url');

        // ২. Adsgram সেটআপ (এখানে আপনার আসল Block ID বসাবেন)
        const AdController = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID_HERE" });

        document.getElementById('playBtn').onclick = () => {
            if (!targetUrl) {
                alert("ভুল লিংক! ভিডিও লিংক পাওয়া যায়নি।");
                return;
            }

            // ৩. অ্যাড দেখানো শুরু
            AdController.show().then((result) => {
                if (result.done) {
                    // ৪. অ্যাড সফলভাবে দেখলে রিডাইরেক্ট
                    window.location.href = decodeURIComponent(targetUrl);
                } else {
                    alert("ভিডিও দেখতে হলে সম্পূর্ণ অ্যাডটি দেখা বাধ্যতামূলক!");
                }
            }).catch((err) => {
                console.error("Ad error:", err);
                alert("অ্যাড লোড হতে সমস্যা হচ্ছে। আবার চেষ্টা করুন।");
            });
        };
    </script>
</body>
  </html>
